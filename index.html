<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>もりすくスタジオ — 香川県高松市のコスプレ専用スタジオ</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Shippori+Mincho:wght@400;500;700&family=Noto+Sans+JP:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=photo-fixed-v1" />
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js?v=photo-fixed-v1"></script>
  <script type="text/babel" src="tweaks-panel.jsx?v=photo-fixed-v1"></script>
  <script type="text/babel" src="components.jsx?v=photo-fixed-v1"></script>
  <script type="text/babel" src="components2.jsx?v=photo-fixed-v1"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [t, setTweak] = useTweaks(window.TWEAK_DEFAULTS);

      useEffect(() => {
        document.documentElement.dataset.theme = t.theme;
      }, [t.theme]);

      // scroll reveal
      useEffect(() => {
        const io = new IntersectionObserver((entries) => {
          entries.forEach(e => { if (e.isIntersecting) e.target.classList.add("in"); });
        }, { threshold: 0.12 });
        document.querySelectorAll(".reveal").forEach(el => io.observe(el));
        return () => io.disconnect();
      }, [t.theme]);

      return (
        <>
          <Nav />
          <Hero showSparkles={t.showSparkles} />
          <div className="reveal"><BoothShowcase /></div>
          <div className="reveal"><Pricing /></div>
          <div className="reveal"><Booking /></div>
          <div className="reveal"><Flow /></div>
          <div className="reveal"><FAQ /></div>
          <div className="reveal"><Access /></div>
          <div className="reveal"><SNS /></div>
          <Footer />

          <TweaksPanel>
            <TweakSection label="デザイン案" />
            <TweakRadio
              label="テーマ"
              value={t.theme}
              options={[
                { value: "a", label: "A. ゆめかわポップ" },
                { value: "b", label: "B. ミニマルガーリー" },
              ]}
              onChange={(v) => setTweak("theme", v)}
            />
            <TweakSection label="演出" />
            <TweakToggle
              label="キラキラ演出"
              value={t.showSparkles}
              onChange={(v) => setTweak("showSparkles", v)}
            />
            <TweakSection label="ショートカット" />
            <div style={{display:"flex", flexDirection:"column", gap:6}}>
              <a href="#booths" style={{fontSize:11, color:"#29261b", padding:"6px 10px", background:"rgba(0,0,0,.05)", borderRadius:8}}>→ ブース</a>
              <a href="#pricing" style={{fontSize:11, color:"#29261b", padding:"6px 10px", background:"rgba(0,0,0,.05)", borderRadius:8}}>→ 料金</a>
              <a href="#booking" style={{fontSize:11, color:"#29261b", padding:"6px 10px", background:"rgba(0,0,0,.05)", borderRadius:8}}>→ ご予約</a>
            </div>
          </TweaksPanel>
        </>
      );
    }

    document.documentElement.dataset.theme = window.TWEAK_DEFAULTS.theme || "a";
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
